version: "3.8"

services:
  backend:
    build:
      context: .                  # 构建上下文为根目录
      dockerfile: my-blog-backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app            # 持久化 SQLite 数据库文件（确保数据库文件在 backend 根目录）
      - static_data:/app/static # 持久化上传的文件（图片、笔记等）
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}          # 从 .env 文件或环境变量读取
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
      - SENDER_EMAIL=${SENDER_EMAIL}               # 可选
      - SENDER_AUTH_CODE=${SENDER_AUTH_CODE}
      - ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: .                  # 同样使用根目录上下文
      dockerfile: my-blog-frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
  static_data: