# ═══════════════════════════════════════════════════
# HTTP → HTTPS 重定向
# ═══════════════════════════════════════════════════
server {
    listen 80;
    server_name littlebanbrick.cn www.littlebanbrick.cn;

    # Certbot 续期验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其它请求一律跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ═══════════════════════════════════════════════════
# HTTPS 主服务器
# ═══════════════════════════════════════════════════
server {
    listen 443 ssl;
    http2 on;
    server_name littlebanbrick.cn www.littlebanbrick.cn;

    client_max_body_size 20m;

    # ---- SSL 证书 ----
    ssl_certificate     /etc/letsencrypt/live/littlebanbrick.cn-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/littlebanbrick.cn-0001/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---- 安全响应头 ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data: https:; media-src 'self' https:; connect-src 'self' https:; frame-src 'none'; object-src 'none'" always;

    root /usr/share/nginx/html;
    index index.html;

    # ---- SPA 路由 ----
    location / {
        try_files $uri /index.html;
    }

    # ---- API 代理 ----
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_send_timeout 10s;
    }

    # ---- 静态文件代理 ----
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /photos/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
